name: Release GGF Tray EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -r ggf-menu/requirements.txt

      - name: Build EXE
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name GGF-Tray-OneFile `
            --distpath ggf-menu/dist_onefile `
            --workpath ggf-menu/build_onefile `
            --icon ggf-menu/logo.ico `
            --add-data "ggf-menu/logo.ico;." `
            --collect-all pyaudiowpatch `
            --hidden-import app_search `
            --hidden-import audio_visualizer_tray `
            --hidden-import ggf_auth_token `
            --hidden-import PyQt6.QtWebEngineWidgets `
            ggf-menu/ggf-tray.py

      - name: Generate release notes
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $sha = "${{ github.sha }}"
          $tag = "${{ github.ref_name }}"
          $base = "https://raw.githubusercontent.com/$repo/$sha/.github/release-assets"
          @"
          ## GGF Tray $tag

          ![GGF Banner]($base/youtube-banner.jpg)

          ![GGF Logo]($base/logo.png)

          ### What's in this release

          - One-file Windows executable for GGF Tray
          - Audio visualizer and tray utility workflows
          - Build generated by GitHub Actions

          ### Included Asset

          - `GGF-Tray-OneFile.exe`

          ![Founder]($base/founder.jpg)
          "@ | Set-Content -Path release_notes.md -Encoding UTF8

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ggf-tray-onefile-${{ github.ref_name }}
          path: ggf-menu/dist_onefile/GGF-Tray-OneFile.exe

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: ggf-menu/dist_onefile/GGF-Tray-OneFile.exe
